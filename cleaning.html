<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaning Department — Empire World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f5a9e 0%, #8d015d 100%); color: #fff; min-height: 100vh; }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; }
        .back { display: inline-block; margin-bottom: 24px; color: #e6c8e6; text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 14px; border: 1px solid #a0327d; border-radius: 20px; transition: all 0.18s; }
        .back:hover { background: #a0327d; color: #fff; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 34px; margin-bottom: 8px; }
        header p { color: #d9c2d9; font-size: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 22px; }
        .tile { background: rgba(13,50,100,0.75); border: 2px solid #a0327d; border-radius: 16px; padding: 26px; box-shadow: 0 6px 20px rgba(0,0,0,0.3); transition: transform 0.18s, box-shadow 0.18s; display: flex; flex-direction: column; min-height: 190px; text-decoration: none; color: #fff; }
        .tile.active { cursor: pointer; }
        .tile.active:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.45); border-color: #d34da0; }
        .tile.soon { opacity: 0.62; cursor: pointer; }
        .tile.soon:hover { opacity: 0.78; }
        .tile .icon { font-size: 40px; margin-bottom: 14px; }
        .tile h2 { font-size: 20px; margin-bottom: 8px; }
        .tile p { font-size: 13px; color: #cdd8e6; flex: 1; }
        .badge { display: inline-block; margin-top: 14px; align-self: flex-start; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; padding: 5px 11px; border-radius: 20px; text-transform: uppercase; }
        .badge.open { background: #27ae60; color: #fff; }
        .badge.wait { background: #5b3b6e; color: #e6c8e6; border: 1px solid #a0327d; }
        footer { text-align: center; margin-top: 45px; color: #cbb6cb; font-size: 13px; }
        footer strong { color: #fff; }
    </style>
</head>
<body>
    <div class="wrap">
        <div style="padding:16px 0 0 24px;"><img src="logo.png" alt="Empire World" style="height:48px;width:auto;"></div>
    <a class="back" href="index.html">← Back to Empire World</a>
        <header>
            <h1>Cleaning Department</h1>
            <p>Choose a section to open</p>
        </header>
        <div class="grid" id="grid"></div>
        <footer>Prepared by <strong>Swar Dizayee</strong></footer>
    </div>

    <script>
        /* ===== Themed dialogs (replace browser alert/confirm) ===== */
        (function(){
          function ov(){ var o=document.getElementById('uiDlg'); if(!o){ o=document.createElement('div'); o.id='uiDlg'; o.style.cssText='display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:4000;align-items:center;justify-content:center;'; o.innerHTML='<div style="background:#0d3a6e;border:2px solid #a0327d;border-radius:14px;max-width:430px;width:92%;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,0.5);color:#fff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;"><div id="uiDlgMsg" style="font-size:15px;line-height:1.5;margin-bottom:18px;white-space:pre-wrap;"></div><div id="uiDlgBtns" style="display:flex;gap:10px;justify-content:flex-end;"></div></div>'; document.body.appendChild(o); } return o; }
          function mkbtn(t,bg){ var b=document.createElement('button'); b.textContent=t; b.style.cssText='background:'+bg+';color:#fff;border:2px solid '+bg+';padding:10px 18px;border-radius:6px;font-weight:600;font-size:14px;cursor:pointer;'; return b; }
          window.uiAlert=function(msg){ return new Promise(function(res){ var o=ov(); document.getElementById('uiDlgMsg').textContent=String(msg); var bw=document.getElementById('uiDlgBtns'); bw.innerHTML=''; var ok=mkbtn('OK','#a0327d'); ok.onclick=function(){ o.style.display='none'; res(); }; bw.appendChild(ok); o.style.display='flex'; setTimeout(function(){ok.focus();},30); }); };
          window.uiConfirm=function(msg){ return new Promise(function(res){ var o=ov(); document.getElementById('uiDlgMsg').textContent=String(msg); var bw=document.getElementById('uiDlgBtns'); bw.innerHTML=''; var c=mkbtn('Cancel','#0d4a85'); c.onclick=function(){ o.style.display='none'; res(false); }; var ok=mkbtn('OK','#C5504F'); ok.onclick=function(){ o.style.display='none'; res(true); }; bw.appendChild(c); bw.appendChild(ok); o.style.display='flex'; setTimeout(function(){ok.focus();},30); }); };
          window.alert=function(m){ window.uiAlert(m); };
        })();

        // Set active:true and a link to turn a placeholder into a real dashboard later.
        const sections = [
            { icon:'🧹', name:'Cleaning', desc:'Daily reports, task checklists & monthly report.', link:'cleaning-dashboard.html', active:true },
            { icon:'🧱', name:'Civil Issue', desc:'Building issues found during cleaning rounds — log photos & track repairs.', link:'civil-issue.html', active:true },
            { icon:'⚡', name:'Electric Issue', desc:'Electrical problems found in buildings — log photos & track repairs.', link:'electric-issue.html', active:true },
            { icon:'🧯', name:'Fire Fighting & Mechanical', desc:'Fire safety systems & mechanical equipment — inspections and maintenance.', link:'fire-fighting-issue.html', active:true }
        ];

        function render(){
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            sections.forEach(c => {
                let el;
                if (c.active && c.link) {
                    el = document.createElement('a');
                    el.href = c.link;
                    el.className = 'tile active';
                } else {
                    el = document.createElement('div');
                    el.className = 'tile soon';
                    el.addEventListener('click', () => alert(c.name + ' is coming soon.'));
                }
                el.innerHTML = '<div class="icon">' + c.icon + '</div>' +
                    '<h2>' + c.name + '</h2>' +
                    '<p>' + c.desc + '</p>' +
                    '<span class="badge ' + (c.active ? 'open' : 'wait') + '">' + (c.active ? 'Open' : 'Coming Soon') + '</span>';
                grid.appendChild(el);
            });
        }
        render();
    </script>
</body>
</html>
