<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#8d015d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Empire EGS">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" href="logo-light.png" type="image/png">
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://api.imgbb.com">
    <title>Empire General Service — Login</title>
    <link rel="stylesheet" href="assets/empire-hub.css">
</head>
<body class="login-landing">
    <div class="topbar">
      <img src="logo-light.png" alt="Empire General Service" class="empire-logo" style="height:48px;width:auto;">
      <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark or light mode"><span class="nav-icon theme-icon"></span> <span class="lbl">Theme</span></button>
    </div>

    <div id="loginView" class="wrap wide login-wrap">
        <header>
            <h1>Empire General Service</h1>
            <p>Sign in to open your dashboard</p>
        </header>
        <div class="hub-auth hub-auth-landing">
            <h2>Login</h2>
            <div class="hub-auth-msg" id="hubLoginMessage"></div>
            <form class="hub-auth-form" onsubmit="handleHubLogin(event)">
                <input type="text" id="hubUsername" placeholder="Username" required autocomplete="username">
                <input type="password" id="hubPassword" placeholder="Password" required autocomplete="current-password">
                <button type="submit">Sign in</button>
            </form>
        </div>
        <footer>Prepared by <strong>Swar Dizayee</strong></footer>
    </div>

    <div id="adminView" class="hub-dashboard" style="display:none;">
        <header class="hub-toolbar">
            <div class="hub-toolbar-side hub-toolbar-side-left">
                <img src="logo-light.png" alt="Empire General Service" class="hub-toolbar-logo empire-logo">
            </div>
            <div class="hub-toolbar-brand">
                <div class="hub-toolbar-text">
                    <div class="hub-toolbar-title">Empire General Service</div>
                    <div class="hub-toolbar-sub" id="hubSubtitle">Departments</div>
                </div>
            </div>
            <div class="hub-toolbar-actions">
                <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark or light mode"><span class="nav-icon theme-icon"></span> <span class="lbl">Theme</span></button>
                <div id="hubAuth" class="hub-user-menu"></div>
            </div>
        </header>
        <main class="hub-main">
            <div class="hub-page-head">
                <h2 id="hubPageTitle">Select a department</h2>
                <p id="hubPageDesc">Choose where you want to work.</p>
            </div>
            <div class="grid" id="grid"></div>
        </main>
        <footer>Prepared by <strong>Swar Dizayee</strong></footer>
    </div>

    <script src="config.js"></script>
    <script src="assets/empire-api.js"></script>
    <script src="assets/empire-auth.js"></script>
    <script src="assets/empire-core.js"></script>
    <script src="assets/empire-hub-stats.js"></script>
    <script>
        const categories = [
            { icon:'🧹', name:'Cleaning Department', desc:'Daily reports, issues found on rounds & more.', link:'cleaning.html', active:true, accessDept:'cleaning', expandable:true },
            { icon:'🏗️', name:'Civil Department', desc:'Daily maintenance jobs & monthly reports.', link:'civil-department.html', active:true, accessDept:'civil department' },
            { icon:'⛑️', name:'HSE Inspections', desc:'Fire safety equipment checks.', link:'hse-inspection.html', active:true, accessDept:'hse' },
            { icon:'⚡', name:'Electrical Department', desc:'Jobs, field reports, monthly reports & electric issues.', link:'electrical.html', active:true, accessDept:'electrical department,electric issue' }
        ];

        const CLEANING_SECTIONS = [
            { icon:'🧹', name:'Cleaning', desc:'Daily reports, task checklists & monthly report.', link:'cleaning-dashboard.html', accessDept:'cleaning' },
            { icon:'🧱', name:'Civil Issue', desc:'Building issues found during cleaning rounds — log photos & track repairs.', link:'civil-issue.html', accessDept:'civil issue' },
            { icon:'🧯', name:'Fire Fighting & Mechanical', desc:'Fire safety systems & mechanical equipment — inspections and maintenance.', link:'fire-issue.html', accessDept:'fire' }
        ];

        function afterLogin() {
            routeAfterLogin();
        }

        function routeAfterLogin() {
            var single = empireSingleDeptHome();
            if (single) {
                empireRedirectToDeptHome(single);
                return;
            }
            showAdminHub();
        }

        function handleHubLogin(e) {
            var btn = e && e.target && e.target.querySelector ? e.target.querySelector('button[type="submit"]') : null;
            if (!btn && e && e.target && e.target.tagName === 'BUTTON') btn = e.target;
            if (btn) btn.disabled = true;
            empireAuthLogin(e, 'auto', {
                usernameId: 'hubUsername',
                passwordId: 'hubPassword',
                messageEl: document.getElementById('hubLoginMessage'),
                onSuccess: afterLogin
            }).catch(function () {
                if (btn) btn.disabled = false;
            });
        }

        function hubLogout() {
            uiConfirm('Log out?').then(function (ok) {
                if (!ok) return;
                empireAuthLogout({ redirect: 'index.html', reload: false });
            });
        }

        function showAdminHub() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('adminView').style.display = '';
            document.querySelector('.topbar').style.display = 'none';
            document.body.classList.remove('login-landing');
            var isAdmin = empireIsAdminSession();
            var sub = document.getElementById('hubSubtitle');
            var title = document.getElementById('hubPageTitle');
            var desc = document.getElementById('hubPageDesc');
            if (sub) sub.textContent = isAdmin ? 'Admin hub' : 'Your departments';
            if (title) title.textContent = isAdmin ? 'All departments' : 'Your departments';
            if (desc) desc.textContent = isAdmin
                ? 'Open any section below to manage operations. Click Cleaning Department to see its sections.'
                : 'Open one of your assigned sections below. Click Cleaning Department to see its sections.';
            renderAuthBar();
            renderGrid();
            loadHubSummaryForIndex();
        }

        function showLoginOnly() {
            document.getElementById('loginView').style.display = '';
            document.getElementById('adminView').style.display = 'none';
            document.querySelector('.topbar').style.display = '';
            document.body.classList.add('login-landing');
        }

        function renderAuthBar() {
            var box = document.getElementById('hubAuth');
            var u = empireGetUser();
            var role = empireGetRole();
            var initial = (u || 'U').charAt(0).toUpperCase();
            box.innerHTML =
                '<div class="hub-user-dropdown-wrap" id="hubUserDropdown">' +
                    '<button type="button" class="hub-user-chip" onclick="toggleUserMenu(event)" aria-haspopup="true" aria-expanded="false" id="hubUserMenuBtn">' +
                        '<span class="hub-user-avatar" aria-hidden="true">' + initial + '</span>' +
                        '<span class="hub-user-meta">' +
                            '<span class="hub-user-name">' + (u || 'user') + '</span>' +
                            (role ? ('<span class="hub-user-role">' + role + '</span>') : '') +
                        '</span>' +
                        '<span class="hub-user-caret" aria-hidden="true">▾</span>' +
                    '</button>' +
                    '<div class="hub-user-menu-panel" id="hubUserMenuPanel" role="menu">' +
                        '<button type="button" class="hub-user-menu-item" role="menuitem" onclick="hubLogout()">Logout</button>' +
                    '</div>' +
                '</div>';
        }

        function toggleUserMenu(e) {
            if (e && e.stopPropagation) e.stopPropagation();
            var wrap = document.getElementById('hubUserDropdown');
            var btn = document.getElementById('hubUserMenuBtn');
            if (!wrap) return;
            var open = wrap.classList.toggle('open');
            if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        function closeUserMenu() {
            var wrap = document.getElementById('hubUserDropdown');
            var btn = document.getElementById('hubUserMenuBtn');
            if (wrap) wrap.classList.remove('open');
            if (btn) btn.setAttribute('aria-expanded', 'false');
        }

        document.addEventListener('click', function (e) {
            var wrap = document.getElementById('hubUserDropdown');
            if (!wrap || !wrap.classList.contains('open')) return;
            if (!wrap.contains(e.target)) closeUserMenu();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeUserMenu();
        });

        var CLEANING_CHILD_DEPTS = ['cleaning', 'civil issue', 'fire'];

        function canSeeHubTile(accessDept) {
            if (empireIsAdminSession()) return true;
            if (empireCanAccessDept(accessDept)) return true;
            if (accessDept === 'cleaning') {
                for (var i = 0; i < CLEANING_CHILD_DEPTS.length; i++) {
                    if (empireCanAccessDept(CLEANING_CHILD_DEPTS[i])) return true;
                }
            }
            return false;
        }

        function canSeeCleaningSection(accessDept) {
            if (empireIsAdminSession()) return true;
            return empireCanAccessDept(accessDept);
        }

        function visibleCleaningSections() {
            return CLEANING_SECTIONS.filter(function (s) { return canSeeCleaningSection(s.accessDept); });
        }

        function setCleaningExpanded(tile, open) {
            if (!tile) return;
            tile.classList.toggle('expanded', !!open);
            var head = tile.querySelector('.tile-expand-head');
            if (head) head.setAttribute('aria-expanded', open ? 'true' : 'false');
            if (open && history.replaceState) {
                history.replaceState(null, '', '#cleaning');
            } else if (!open && location.hash === '#cleaning' && history.replaceState) {
                history.replaceState(null, '', location.pathname + location.search);
            }
        }

        function toggleCleaningExpand(tile, e) {
            if (e && e.target && e.target.closest('.tile-child')) return;
            setCleaningExpanded(tile, !tile.classList.contains('expanded'));
        }

        function closeCleaningExpand() {
            var tile = document.getElementById('hubCleaningTile');
            if (tile && tile.classList.contains('expanded')) setCleaningExpanded(tile, false);
        }

        function buildCleaningExpandable(c) {
            var sections = visibleCleaningSections();
            if (!sections.length) return null;
            var el = document.createElement('div');
            el.className = 'tile tile-expandable active';
            el.id = 'hubCleaningTile';
            el.setAttribute('data-dept', c.accessDept);
            var childrenHtml = sections.map(function (s) {
                return '<a href="' + s.link + '" class="tile-child" data-dept="' + s.accessDept + '">' + hubChildTileHtml(s) + '</a>';
            }).join('');
            el.innerHTML =
                '<button type="button" class="tile-expand-head" aria-expanded="false">' +
                    hubExpandableTileHeadHtml(c) +
                '</button>' +
                '<div class="tile-children">' + childrenHtml + '</div>';
            el.querySelector('.tile-expand-head').addEventListener('click', function (e) {
                toggleCleaningExpand(el, e);
            });
            return el;
        }

        function applyHubSummary(summary) {
            applyHubTileStats('#grid .tile[data-dept]:not(.tile-expandable)', summary || {});
            var cleaning = summary && summary.cleaning;
            if (!cleaning) return;
            applyHubTileStats('#hubCleaningTile', { cleaning: cleaning });
            if (cleaning.sections) {
                applyHubTileStats('#hubCleaningTile .tile-child[data-dept]', cleaning.sections);
            }
        }

        function loadHubSummaryForIndex() {
            loadHubSummary({
                onData: function (summary) { applyHubSummary(summary); },
                onError: function () {
                    applyHubSummary({});
                    document.querySelectorAll('#grid .tile-footer').forEach(function (el) {
                        el.innerHTML = '<div class="tile-stat muted">Stats unavailable</div>';
                    });
                }
            });
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            var count = 0;
            categories.forEach(function (c) {
                if (!canSeeHubTile(c.accessDept)) return;
                count++;
                if (c.expandable) {
                    var expandable = buildCleaningExpandable(c);
                    if (expandable) grid.appendChild(expandable);
                    return;
                }
                var el = document.createElement('a');
                el.href = c.link;
                el.className = 'tile active';
                el.setAttribute('data-dept', c.accessDept);
                el.innerHTML = hubTileHtml(c);
                grid.appendChild(el);
            });
            if (!count) {
                grid.innerHTML = '<div class="hub-empty">No departments are assigned to this account.</div>';
            }
            if (location.hash === '#cleaning') {
                var tile = document.getElementById('hubCleaningTile');
                if (tile) setCleaningExpanded(tile, true);
            }
        }

        document.addEventListener('click', function (e) {
            var tile = document.getElementById('hubCleaningTile');
            if (!tile || !tile.classList.contains('expanded')) return;
            if (!tile.contains(e.target)) closeCleaningExpand();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeCleaningExpand();
        });

        function bootIndex() {
            if (!empireGetToken()) {
                showLoginOnly();
                return;
            }
            routeAfterLogin();
        }

        bootIndex();
    </script>
</body>
</html>
